# 最小快速GTP配置：只对战必需键，响应<3秒
# 日志（基本）
logDir = gtp_logs
logAllGTPCommunication = true
logSearchInfo = true
logToStderr = false

# 规则（覆盖koRule等，避免错误）
rules = tromp-taylor  # 简单规则；换japanese/chinese如需

# 默认棋盘
defaultBoardSize = 19

# 认输
allowResignation = true
resignThreshold = -0.90
resignConsecTurns = 3

# 让子补偿
assumeMultipleStartingBlackMovesAreHandicap = true

# 反镜像
antiMirror = true
enablePassingHacks = true

# 搜索加速（核心）
maxVisits = 50  # 进一步调小：400=超快（<3秒），棋力业余2-3段；想强点用800
numSearchThreads = 4  # 你的CPU核心数（任务管理器查逻辑处理器）
ponderingEnabled = false  # 禁用后台思考
lagBuffer = 1.0

# 通过后加速
searchFactorAfterOnePass = 0.50
searchFactorAfterTwoPasses = 0.25

# 保守Pass
conservativePass = true
fillDameBeforePass = true